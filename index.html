<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Frozen Spot Operations</title>
  <style>
    body {
      background: #000;
      color: #fff;
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 12px;
    }

    .header {
      text-align: center;
      font-size: 56px;
      font-weight: bold;
      margin-bottom: 18px;
    }

    .container {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 18px;
    }

    .section {
      background: #111;
      border-radius: 8px;
      padding: 18px;
      min-height: 240px;
    }

    .section h2 {
      font-size: 34px;
      margin: 0 0 14px 0;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th, td {
      text-align: left;
      padding: 8px 6px;
      font-size: 26px;
      border-bottom: 1px solid #222;
    }

    .footer {
      text-align: center;
      margin-top: 18px;
      font-size: 22px;
      color: #bbb;
    }

    .empty {
      color: #888;
      font-size: 24px;
      padding-top: 10px;
    }
  </style>
</head>
<body>
  <div class="header">FROZEN SPOT OPERATIONS</div>

  <div class="container">
    <div class="section">
      <h2>ARRIVING</h2>
      <table id="arriving"></table>
      <div id="arrivingEmpty" class="empty" style="display:none;">No arrivals</div>
    </div>

    <div class="section">
      <h2>ACTIVE DOCKS</h2>
      <table id="loading"></table>
      <div id="loadingEmpty" class="empty" style="display:none;">No active docks</div>
    </div>

    <div class="section">
      <h2>DEPARTURES</h2>
      <table id="departures"></table>
      <div id="departuresEmpty" class="empty" style="display:none;">No departures</div>
    </div>
  </div>

  <div class="footer">Warehouse Dashboard – Auto Refresh</div>

  <script>
    const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSnxm662nS0LeYmimnNz1l7EPkJ3NXfRb55aiMjfzrb1S7kP8lxIpp3k6EDJom8fpLdjYNIgXbGU2NP/pub?gid=0&single=true&output=csv";

    function parseCSV(text) {
      const rows = [];
      let row = [];
      let cell = "";
      let inQuotes = false;

      for (let i = 0; i < text.length; i++) {
        const char = text[i];
        const nextChar = text[i + 1];

        if (char === '"') {
          if (inQuotes && nextChar === '"') {
            cell += '"';
            i++;
          } else {
            inQuotes = !inQuotes;
          }
        } else if (char === ',' && !inQuotes) {
          row.push(cell);
          cell = "";
        } else if ((char === '\n' || char === '\r') && !inQuotes) {
          if (char === '\r' && nextChar === '\n') i++;
          row.push(cell);
          if (row.some(c => c.trim() !== "")) rows.push(row);
          row = [];
          cell = "";
        } else {
          cell += char;
        }
      }

      if (cell.length > 0 || row.length > 0) {
        row.push(cell);
        if (row.some(c => c.trim() !== "")) rows.push(row);
      }

      return rows;
    }

    function clean(value) {
      return (value || "").trim();
    }

    function addRow(tableId, eta, container, door) {
      const table = document.getElementById(tableId);
      const tr = document.createElement("tr");
      tr.innerHTML = `
        <td>${eta}</td>
        <td>${container}</td>
        <td>${door ? "Door " + door : ""}</td>
      `;
      table.appendChild(tr);
    }

    fetch(url)
      .then(r => r.text())
      .then(text => {
        const rows = parseCSV(text);
        if (rows.length < 2) return;

        const dataRows = rows.slice(1);

        let arrivingCount = 0;
        let loadingCount = 0;
        let departureCount = 0;

        dataRows.forEach(cols => {
          const eta = clean(cols[2]);
          const direction = clean(cols[3]);
          const container = clean(cols[4]);
          const door = clean(cols[6]);
          const status = clean(cols[7]);

          if (!eta && !direction && !container) return;

          if (direction === "Arriving") {
            addRow("arriving", eta, container, door);
            arrivingCount++;
          }

          if (direction === "Leaving") {
            addRow("departures", eta, container, door);
            departureCount++;
          }

          if (status === "Loading" || status === "Unloading") {
            addRow("loading", eta, container, door);
            loadingCount++;
          }
        });

        if (arrivingCount === 0) {
          document.getElementById("arrivingEmpty").style.display = "block";
        }
        if (loadingCount === 0) {
          document.getElementById("loadingEmpty").style.display = "block";
        }
        if (departureCount === 0) {
          document.getElementById("departuresEmpty").style.display = "block";
        }
      })
      .catch(err => {
        console.error(err);
        document.getElementById("arrivingEmpty").style.display = "block";
        document.getElementById("arrivingEmpty").textContent = "Could not load sheet data";
        document.getElementById("loadingEmpty").style.display = "block";
        document.getElementById("loadingEmpty").textContent = "Could not load sheet data";
        document.getElementById("departuresEmpty").style.display = "block";
        document.getElementById("departuresEmpty").textContent = "Could not load sheet data";
      });

    setTimeout(() => location.reload(), 15000);
  </script>
</body>
</html>
