<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Frozen Spot Operations</title>

<style>
body{
  background:#000;
  color:#fff;
  font-family:Arial,sans-serif;
  margin:0;
  padding:10px;
}

.header{
  text-align:center;
  font-size:60px;
  font-weight:bold;
  margin-bottom:15px;
}

.topbar{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:14px;
  margin-bottom:14px;
}

.counter{
  background:#111;
  border-radius:8px;
  padding:14px;
  text-align:center;
}

.counter-label{
  font-size:20px;
  color:#bbb;
}

.counter-value{
  font-size:42px;
  font-weight:bold;
}

.view-toggle{
  display:flex;
  justify-content:center;
  gap:12px;
  margin-bottom:16px;
}

.toggle-btn{
  background:#111;
  color:#fff;
  border:1px solid #333;
  border-radius:8px;
  padding:10px 18px;
  font-size:18px;
  cursor:pointer;
}

.toggle-btn.active{
  background:#1f1f1f;
  border-color:#666;
}

.container{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:18px;
}

.section{
  background:#111;
  border-radius:8px;
  padding:18px;
  min-height:320px;
}

.section h2{
  font-size:34px;
  margin-bottom:14px;
}

table{
  width:100%;
  border-collapse:collapse;
}

td{
  padding:10px;
  font-size:24px;
  border-bottom:1px solid #222;
  vertical-align:top;
}

.time-block{
  line-height:1.2;
}

.time-date{
  display:block;
  font-size:16px;
  color:#bbb;
  margin-bottom:4px;
}

.time-hour{
  display:block;
  font-size:24px;
  font-weight:bold;
}

.small{
  display:block;
  font-size:16px;
  color:#bbb;
  margin-top:3px;
}

.footer{
  text-align:center;
  margin-top:16px;
  font-size:22px;
  color:#bbb;
}

/* Month calendar */
.calendar-view{
  display:none;
  background:#111;
  border-radius:8px;
  padding:18px;
  min-height:320px;
}

.calendar-toolbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:14px;
}

.calendar-title{
  font-size:34px;
  font-weight:bold;
}

.calendar-grid{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:8px;
}

.calendar-weekday{
  text-align:center;
  font-size:18px;
  color:#bbb;
  padding:8px 0;
  background:#0c0c0c;
  border-radius:6px;
}

.calendar-cell{
  background:#0d0d0d;
  border:1px solid #222;
  border-radius:8px;
  min-height:120px;
  padding:8px;
  display:flex;
  flex-direction:column;
}

.calendar-cell.empty{
  background:#080808;
  border-color:#111;
}

.calendar-day-number{
  font-size:18px;
  font-weight:bold;
  margin-bottom:6px;
  color:#fff;
}

.calendar-event{
  font-size:14px;
  line-height:1.2;
  border-radius:6px;
  padding:5px 6px;
  margin-bottom:5px;
  overflow:hidden;
  white-space:nowrap;
  text-overflow:ellipsis;
  font-weight:bold;
}

.event-in{
  background:rgba(211,47,47,.28);
  color:#ffb3b3;
  border:1px solid rgba(211,47,47,.55);
}

.event-out{
  background:rgba(25,118,210,.28);
  color:#b8d8ff;
  border:1px solid rgba(25,118,210,.55);
}

/* status colors for board */
.status-loading td,
.status-unloading td{
  background:rgba(255,193,7,.30);
  color:#ffe082;
}

.status-complete td{
  color:#888;
}

.status-hold td,
.status-problem td{
  background:rgba(244,67,54,.35);
  color:#ff9e9e;
  font-weight:bold;
}

.status-checkedin td,
.status-checked-in td{
  background:rgba(76,175,80,.30);
  color:#b9f6ca;
}

.late td{
  background:rgba(211,47,47,.45)!important;
  color:#ffd0d0!important;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="header">FROZEN SPOT OPERATIONS</div>

<div class="topbar">
  <div class="counter">
    <div class="counter-label">Arriving</div>
    <div id="countArriving" class="counter-value">0</div>
  </div>
  <div class="counter">
    <div class="counter-label">Active Docks</div>
    <div id="countLoading" class="counter-value">0</div>
  </div>
  <div class="counter">
    <div class="counter-label">Departures</div>
    <div id="countDepartures" class="counter-value">0</div>
  </div>
  <div class="counter">
    <div class="counter-label">Late / Hold</div>
    <div id="countLate" class="counter-value">0</div>
  </div>
</div>

<div class="view-toggle">
  <button id="boardBtn" class="toggle-btn active" onclick="showBoardView()">Board View</button>
  <button id="calendarBtn" class="toggle-btn" onclick="showCalendarView()">Calendar View</button>
</div>

<div id="boardView" class="container">
  <div class="section">
    <h2>ARRIVING</h2>
    <table id="arriving"></table>
  </div>

  <div class="section">
    <h2>ACTIVE DOCKS</h2>
    <table id="loading"></table>
  </div>

  <div class="section">
    <h2>DEPARTURES</h2>
    <table id="departures"></table>
  </div>
</div>

<div id="calendarView" class="calendar-view">
  <div class="calendar-toolbar">
    <div id="calendarTitle" class="calendar-title">Month View</div>
  </div>
  <div id="calendarGrid"></div>
</div>

<div class="footer">Warehouse Dashboard – Auto Refresh</div>

<script>
const url="https://docs.google.com/spreadsheets/d/e/2PACX-1vSnxm662nS0LeYmimnNz1l7EPkJ3NXfRb55aiMjfzrb1S7kP8lxIpp3k6EDJom8fpLdjYNIgXbGU2NP/pub?gid=0&single=true&output=csv";

function showBoardView(){
  document.getElementById("boardView").style.display="grid";
  document.getElementById("calendarView").style.display="none";
  document.getElementById("boardBtn").classList.add("active");
  document.getElementById("calendarBtn").classList.remove("active");
}

function showCalendarView(){
  document.getElementById("boardView").style.display="none";
  document.getElementById("calendarView").style.display="block";
  document.getElementById("calendarBtn").classList.add("active");
  document.getElementById("boardBtn").classList.remove("active");
}

function parseCSV(text){
  const rows = [];
  let row = [];
  let cell = "";
  let inQuotes = false;

  for (let i = 0; i < text.length; i++) {
    const char = text[i];
    const nextChar = text[i + 1];

    if (char === '"') {
      if (inQuotes && nextChar === '"') {
        cell += '"';
        i++;
      } else {
        inQuotes = !inQuotes;
      }
    } else if (char === ',' && !inQuotes) {
      row.push(cell);
      cell = "";
    } else if ((char === '\n' || char === '\r') && !inQuotes) {
      if (char === '\r' && nextChar === '\n') i++;
      row.push(cell);
      if (row.some(c => c.trim() !== "")) rows.push(row);
      row = [];
      cell = "";
    } else {
      cell += char;
    }
  }

  if (cell.length > 0 || row.length > 0) {
    row.push(cell);
    if (row.some(c => c.trim() !== "")) rows.push(row);
  }

  return rows;
}

function clean(v){
  return (v||"").trim();
}

function normalize(v){
  return clean(v).toLowerCase();
}

function parseDate(dateStr){
  const value = clean(dateStr);
  const parts = value.split("/");
  if(parts.length !== 3) return null;
  return new Date(parts[2], parts[0]-1, parts[1]);
}

function minutes(t){
  if(!t) return 9999;

  const value = clean(t);
  const match = value.match(/^(\d{1,2}):(\d{2})(?::\d{2})?\s*([AaPp][Mm])?$/);
  if(!match) return 9999;

  let hour = parseInt(match[1],10);
  const min = parseInt(match[2],10);
  const ampm = match[3] ? match[3].toUpperCase() : null;

  if(ampm==="PM" && hour!==12) hour += 12;
  if(ampm==="AM" && hour===12) hour = 0;

  return hour*60+min;
}

function formatBoardDate(dateStr){
  const d = parseDate(dateStr);
  if(!d) return clean(dateStr);
  const days = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
  return `${days[d.getDay()]} ${d.getMonth()+1}/${d.getDate()}/${d.getFullYear()}`;
}

function isLate(date,time,status){
  if(normalize(status)==="complete") return false;

  const rowDate = parseDate(date);
  if(!rowDate) return false;

  const now = new Date();
  if(rowDate.toDateString() !== now.toDateString()) return false;

  return minutes(time) < (now.getHours()*60 + now.getMinutes());
}

function createBoardRow(item){
  return `
  <tr class="status-${item.norm} ${item.late ? 'late' : ''}">
    <td>
      <div class="time-block">
        <span class="time-date">${formatBoardDate(item.date)}</span>
        <span class="time-hour">${item.eta}</span>
      </div>
    </td>
    <td>
      ${item.container}
      <span class="small">${item.client}</span>
      <span class="small">${item.cargo} • ${item.country} • ${item.temp}</span>
    </td>
    <td>Door ${item.door}</td>
  </tr>
  `;
}

function monthName(monthIndex){
  const months = [
    "January","February","March","April","May","June",
    "July","August","September","October","November","December"
  ];
  return months[monthIndex];
}

function buildMonthGrid(items){
  const grid = document.getElementById("calendarGrid");
  grid.innerHTML = "";

  if(items.length === 0){
    document.getElementById("calendarTitle").textContent = "No Calendar Data";
    return;
  }

  const sortedItems = [...items].sort((a,b)=>{
    if(a.sortDate !== b.sortDate) return a.sortDate - b.sortDate;
    return a.sortTime - b.sortTime;
  });

  const firstDate = sortedItems[0].parsedDate || new Date();
  const year = firstDate.getFullYear();
  const month = firstDate.getMonth();

  document.getElementById("calendarTitle").textContent = `${monthName(month)} ${year}`;

  const weekdays = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
  weekdays.forEach(day=>{
    const el = document.createElement("div");
    el.className = "calendar-weekday";
    el.textContent = day;
    grid.appendChild(el);
  });

  const firstOfMonth = new Date(year, month, 1);
  const startDay = firstOfMonth.getDay();
  const daysInMonth = new Date(year, month + 1, 0).getDate();

  const itemsByDay = {};
  sortedItems.forEach(item=>{
    if(!item.parsedDate) return;
    if(item.parsedDate.getFullYear() !== year || item.parsedDate.getMonth() !== month) return;

    const dayNum = item.parsedDate.getDate();
    if(!itemsByDay[dayNum]) itemsByDay[dayNum] = [];
    itemsByDay[dayNum].push(item);
  });

  for(let i=0;i<startDay;i++){
    const emptyCell = document.createElement("div");
    emptyCell.className = "calendar-cell empty";
    grid.appendChild(emptyCell);
  }

  for(let day=1; day<=daysInMonth; day++){
    const cell = document.createElement("div");
    cell.className = "calendar-cell";

    const dayNum = document.createElement("div");
    dayNum.className = "calendar-day-number";
    dayNum.textContent = day;
    cell.appendChild(dayNum);

    const dayItems = itemsByDay[day] || [];
    dayItems.forEach(item=>{
      const event = document.createElement("div");
      const isIn = item.direction === "Arriving";
      event.className = "calendar-event " + (isIn ? "event-in" : "event-out");
      event.textContent = `${item.client}-${isIn ? "IN" : "OUT"}`;
      cell.appendChild(event);
    });

    grid.appendChild(cell);
  }
}

fetch(url)
.then(r=>r.text())
.then(text=>{
  let rows = parseCSV(text);
  rows.shift();

  let arriving = [];
  let loading = [];
  let departures = [];
  let allItems = [];
  let lateCount = 0;

  rows.forEach(r=>{
    // 0 Priority
    // 1 Date
    // 2 ETA
    // 3 Direction
    // 4 Type of Cargo
    // 5 Country
    // 6 Container
    // 7 Client
    // 8 Temperature
    // 9 Door
    // 10 Status
    // 11 Notes

    const date = clean(r[1]);
    const eta = clean(r[2]);
    const direction = clean(r[3]);
    const cargo = clean(r[4]);
    const country = clean(r[5]);
    const container = clean(r[6]);
    const client = clean(r[7]);
    const temp = clean(r[8]);
    const door = clean(r[9]);
    const status = clean(r[10]);

    if(!date && !eta && !direction && !container) return;

    const norm = normalize(status);
    const parsedDate = parseDate(date);
    const late = isLate(date,eta,status) || norm.includes("hold") || norm.includes("problem");

    if(late) lateCount++;

    const item = {
      date,
      eta,
      direction,
      cargo,
      country,
      container,
      client,
      temp,
      door,
      status,
      norm,
      late,
      parsedDate,
      sortDate: parsedDate ? parsedDate.getTime() : Number.MAX_SAFE_INTEGER,
      sortTime: minutes(eta)
    };

    allItems.push(item);

    if(direction === "Arriving") arriving.push(item);
    if(direction === "Leaving") departures.push(item);
    if(norm.includes("loading") || norm.includes("unloading")) loading.push(item);
  });

  const sorter = (a,b)=>{
    if(a.sortDate !== b.sortDate) return a.sortDate - b.sortDate;
    return a.sortTime - b.sortTime;
  };

  arriving.sort(sorter);
  loading.sort(sorter);
  departures.sort(sorter);
  allItems.sort(sorter);

  arriving.forEach(x=>{
    document.getElementById("arriving").innerHTML += createBoardRow(x);
  });

  loading.forEach(x=>{
    document.getElementById("loading").innerHTML += createBoardRow(x);
  });

  departures.forEach(x=>{
    document.getElementById("departures").innerHTML += createBoardRow(x);
  });

  document.getElementById("countArriving").innerText = arriving.length;
  document.getElementById("countLoading").innerText = loading.length;
  document.getElementById("countDepartures").innerText = departures.length;
  document.getElementById("countLate").innerText = lateCount;

  buildMonthGrid(allItems);
});

setTimeout(()=>location.reload(),15000);
</script>

</body>
</html>
