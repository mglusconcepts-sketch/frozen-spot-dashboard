<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Frozen Spot Operations</title>
<style>
body{
  background:#111;
  color:white;
  font-family:Arial, sans-serif;
  margin:0;
  padding:20px;
}
.header{
  text-align:center;
  font-size:70px;
  margin-bottom:20px;
}
.container{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:20px;
}
.section{
  background:#1a1a1a;
  padding:20px;
  border-radius:8px;
  min-height:220px;
}
.section h2{
  font-size:40px;
  margin:0 0 15px 0;
}
table{
  width:100%;
  border-collapse:collapse;
}
th, td{
  padding:8px;
  font-size:28px;
  text-align:left;
}
th{
  border-bottom:1px solid #444;
}
.footer{
  margin-top:20px;
  text-align:center;
  font-size:28px;
  color:#bbb;
}
.error{
  color:#ff6b6b;
  text-align:center;
  margin-top:20px;
  font-size:22px;
}
</style>
</head>
<body>

<div class="header">FROZEN SPOT OPERATIONS</div>

<div class="container">
  <div class="section">
    <h2>ARRIVING</h2>
    <table id="arriving"></table>
  </div>

  <div class="section">
    <h2>ACTIVE DOCKS</h2>
    <table id="loading"></table>
  </div>

  <div class="section">
    <h2>DEPARTURES</h2>
    <table id="departures"></table>
  </div>
</div>

<div class="footer">Warehouse Dashboard – Auto Refresh</div>
<div id="error" class="error"></div>

<script>
const sheetID = "1cWbF4ZNVOEwoPKTAx4LISr3Dq5X3tgbigRCkBNOahGw";
const sheetName = "Ops";
const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSnxm66ZnSOLEYmimnNz1l7EPkJ3NXfRb55aiMjfzrb1S7kP8lxIpp3k6EDJom8fpLdjYNlgXbGU2NP/pub?gid=0&single=true&output=csv";

function clean(value) {
  return (value || "").replace(/^"|"$/g, "").trim();
}

fetch(url)
  .then(response => {
    if (!response.ok) {
      throw new Error("Could not read Google Sheet.");
    }
    return response.text();
  })
  .then(data => {
    const rows = data.split(/\r?\n/).slice(1);

    let arrivingHTML = "<tr><th>ETA</th><th>Container</th><th>Door</th></tr>";
    let loadingHTML = "<tr><th>ETA</th><th>Container</th><th>Door</th></tr>";
    let departuresHTML = "<tr><th>ETA</th><th>Container</th><th>Door</th></tr>";

    let arrivingCount = 0;
    let loadingCount = 0;
    let departingCount = 0;

    rows.forEach(row => {
      if (!row.trim()) return;

      const cols = row.split(",");

      // Current sheet layout:
      // A Priority
      // B Date
      // C ETA
      // D Direction
      // E Container
      // F Client
      // G Door
      // H Status
      // I Notes

      const eta = clean(cols[2]);
      const direction = clean(cols[3]);
      const container = clean(cols[4]);
      const door = clean(cols[6]);
      const status = clean(cols[7]);

      if (!eta && !direction && !container) return;

      const rowHTML = `<tr>
        <td>${eta}</td>
        <td>${container}</td>
        <td>${door ? "Door " + door : ""}</td>
      </tr>`;

      if (direction === "Arriving") {
        arrivingHTML += rowHTML;
        arrivingCount++;
      }

      if (direction === "Leaving") {
        departuresHTML += rowHTML;
        departingCount++;
      }

      if (status === "Loading" || status === "Unloading") {
        loadingHTML += rowHTML;
        loadingCount++;
      }
    });

    if (arrivingCount === 0) {
      arrivingHTML += "<tr><td colspan='3'>No arrivals</td></tr>";
    }
    if (loadingCount === 0) {
      loadingHTML += "<tr><td colspan='3'>No active docks</td></tr>";
    }
    if (departingCount === 0) {
      departuresHTML += "<tr><td colspan='3'>No departures</td></tr>";
    }

    document.getElementById("arriving").innerHTML = arrivingHTML;
    document.getElementById("loading").innerHTML = loadingHTML;
    document.getElementById("departures").innerHTML = departuresHTML;
  })
  .catch(error => {
    document.getElementById("error").textContent =
      "Dashboard could not load the Google Sheet. Check sharing/publishing settings.";
    console.error(error);
  });

setTimeout(() => location.reload(), 15000);
</script>

</body>
</html>
