<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<title>Frozen Spot Operations</title>

<style>
html,body{
  height:100%;
  margin:0;
  padding:6px;
  background:#000;
  color:#fff;
  font-family:Arial,sans-serif;
  overflow:hidden;
}

/* HEADER */
.header{
  text-align:center;
  font-size:48px;
  font-weight:bold;
  margin-bottom:8px;
}

/* COUNTERS */
.topbar{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:8px;
  margin-bottom:8px;
}

.counter{
  background:#111;
  padding:8px;
  border-radius:6px;
  text-align:center;
}

.counter-label{font-size:16px;color:#bbb;}
.counter-value{font-size:28px;font-weight:bold;}

/* BOARD */
.container{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:10px;
}

.section{
  background:#111;
  padding:10px;
  border-radius:6px;
}

.section h2{
  margin:0 0 6px;
  font-size:26px;
}

table{width:100%;}
td{
  font-size:18px;
  padding:6px;
  border-bottom:1px solid #222;
}

.small{display:block;font-size:13px;color:#bbb;}

/* CALENDAR MODE */
body.calendar-mode .header,
body.calendar-mode .topbar,
body.calendar-mode .container{
  display:none;
}

/* CALENDAR */
.calendar-view{
  height:100%;
  display:flex;
  flex-direction:column;
}

.calendar-header{
  text-align:center;
  font-size:22px;
  margin-bottom:4px;
}

.month-grid{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  grid-auto-rows:1fr;
  gap:1px;
  height:100%;
}

/* 🔥 WEEKDAY HEADER FIX */
.weekday{
  background:#1a1a1a;
  font-size:11px;
  height:18px;
  display:flex;
  align-items:center;
  justify-content:center; /* CENTERED */
  font-weight:bold;
}

/* DAY CELL */
.day-cell{
  background:#f3f3f3;
  color:#000;
  padding:3px;
  display:flex;
  flex-direction:column;
}

/* DAY NUMBER */
.day-number{
  font-size:12px;
  font-weight:bold;
  margin-bottom:2px;
}

/* EVENTS */
.event-chip{
  font-size:11px;
  margin:1px 0;
  padding:2px 3px;
  border-radius:2px;
  font-weight:bold;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.event-in{
  background:#f7c7c7;
  border-left:3px solid #c62828;
}

.event-out{
  background:#bbdefb;
  border-left:3px solid #1565c0;
}

/* LATE */
.late td{
  background:#8b0000;
  color:#fff;
}
</style>
</head>

<body>

<div class="header">FROZEN SPOT OPERATIONS</div>

<div class="topbar">
  <div class="counter"><div class="counter-label">Arriving</div><div id="countArriving" class="counter-value">0</div></div>
  <div class="counter"><div class="counter-label">Active Docks</div><div id="countLoading" class="counter-value">0</div></div>
  <div class="counter"><div class="counter-label">Departures</div><div id="countDepartures" class="counter-value">0</div></div>
  <div class="counter"><div class="counter-label">Late / Hold</div><div id="countLate" class="counter-value">0</div></div>
</div>

<div id="boardView" class="container">
  <div class="section"><h2>ARRIVING</h2><table id="arriving"></table></div>
  <div class="section"><h2>ACTIVE DOCKS</h2><table id="loading"></table></div>
  <div class="section"><h2>DEPARTURES</h2><table id="departures"></table></div>
</div>

<div id="calendarView" class="calendar-view hidden">
  <div id="calendarHeader" class="calendar-header"></div>
  <div id="calendarGrid" class="month-grid"></div>
</div>

<script>
const url = "YOUR_GOOGLE_SHEET_CSV_URL";

/* HELPERS */
function parseDate(d){
  const p=d.split("/");
  return new Date(p[2],p[0]-1,p[1]);
}

function parseTime(t){
  const m=t.match(/(\d+):(\d+)/);
  if(!m) return 9999;
  return parseInt(m[1])*60+parseInt(m[2]);
}

function isLate(date,time){
  const now=new Date();
  const d=parseDate(date);
  if(d.toDateString()!=now.toDateString()) return false;
  return parseTime(time) < now.getHours()*60+now.getMinutes();
}

/* CALENDAR */
function buildMonthCalendar(items){
  const grid=document.getElementById("calendarGrid");
  const header=document.getElementById("calendarHeader");
  grid.innerHTML="";

  const now=new Date();
  const y=now.getFullYear();
  const m=now.getMonth();

  header.textContent=now.toLocaleString('default',{month:'long'})+" "+y;

  const days=["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
  days.forEach(d=>{
    const el=document.createElement("div");
    el.className="weekday";
    el.textContent=d;
    grid.appendChild(el);
  });

  const first=new Date(y,m,1);
  const last=new Date(y,m+1,0);

  const offset=first.getDay();
  const total=last.getDate();

  const map={};

  items.forEach(i=>{
    if(i.dateObj.getMonth()!=m) return;

    const key=i.dateObj.getDate();

    if(!map[key]) map[key]=[];

    map[key].push(i);
  });

  for(let i=0;i<offset+total;i++){
    const cell=document.createElement("div");
    cell.className="day-cell";

    const day=i-offset+1;

    if(day<1 || day>total){
      cell.style.background="#111";
      grid.appendChild(cell);
      continue;
    }

    const num=document.createElement("div");
    num.className="day-number";
    num.textContent=day;
    cell.appendChild(num);

    const grouped={};

    (map[day]||[]).forEach(it=>{
      const dir=it.direction==="Arriving"?"IN":"OUT";
      const key=it.client+"-"+dir+"-"+it.cargo;

      if(!grouped[key]){
        grouped[key]={...it,count:0,dir};
      }
      grouped[key].count++;
    });

    Object.values(grouped).forEach(g=>{
      const chip=document.createElement("div");
      chip.className="event-chip "+(g.dir==="IN"?"event-in":"event-out");

      chip.textContent=`${g.client}-${g.dir}(${g.cargo})${g.count>1?" x"+g.count:""}`;

      cell.appendChild(chip);
    });

    grid.appendChild(cell);
  }
}

/* LOAD */
fetch(url)
.then(r=>r.text())
.then(t=>{
  const rows=t.split("\n").slice(1);

  const items=[];

  rows.forEach(r=>{
    const c=r.split(",");

    if(!c[1]) return;

    items.push({
      date:c[1],
      dateObj:parseDate(c[1]),
      eta:c[2],
      direction:c[3],
      cargo:c[4],
      client:c[7]
    });
  });

  buildMonthCalendar(items);
});

/* TOGGLE */
let showBoard=true;

setInterval(()=>{
  showBoard=!showBoard;

  document.body.classList.toggle("calendar-mode",!showBoard);

},10000);
</script>

</body>
</html>
