<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Frozen Spot Operations</title>

<style>
body{
background:#000;
color:#fff;
font-family:Arial,sans-serif;
margin:0;
padding:10px;
}

.header{
text-align:center;
font-size:60px;
font-weight:bold;
margin-bottom:15px;
}

.topbar{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:14px;
margin-bottom:14px;
}

.counter{
background:#111;
border-radius:8px;
padding:14px;
text-align:center;
}

.counter-label{
font-size:20px;
color:#bbb;
}

.counter-value{
font-size:42px;
font-weight:bold;
}

.view-toggle{
display:flex;
justify-content:center;
gap:12px;
margin-bottom:16px;
}

.toggle-btn{
background:#111;
color:#fff;
border:1px solid #333;
border-radius:8px;
padding:10px 18px;
font-size:18px;
cursor:pointer;
}

.toggle-btn.active{
background:#1f1f1f;
border-color:#666;
}

.container{
display:grid;
grid-template-columns:1fr 1fr 1fr;
gap:18px;
}

.section{
background:#111;
border-radius:8px;
padding:18px;
min-height:320px;
}

.section h2{
font-size:34px;
margin-bottom:14px;
}

table{
width:100%;
border-collapse:collapse;
}

td{
padding:10px;
font-size:24px;
border-bottom:1px solid #222;
vertical-align:top;
}

.time-block{
line-height:1.2;
}

.time-date{
display:block;
font-size:16px;
color:#bbb;
margin-bottom:4px;
}

.time-hour{
display:block;
font-size:24px;
font-weight:bold;
}

.small{
display:block;
font-size:16px;
color:#bbb;
margin-top:3px;
}

.footer{
text-align:center;
margin-top:16px;
font-size:22px;
color:#bbb;
}

.calendar-view{
display:none;
background:#111;
border-radius:8px;
padding:18px;
min-height:320px;
}

.calendar-day{
margin-bottom:24px;
padding-bottom:18px;
border-bottom:1px solid #222;
}

.calendar-day h3{
font-size:28px;
margin:0 0 12px 0;
color:#fff;
}

.calendar-item{
padding:12px 10px;
border-radius:6px;
margin-bottom:10px;
background:#0d0d0d;
border:1px solid #1c1c1c;
}

.calendar-time{
font-size:24px;
font-weight:bold;
}

.calendar-main{
font-size:24px;
margin-top:4px;
}

.calendar-sub{
font-size:16px;
color:#bbb;
margin-top:4px;
}

/* status colors */
.status-loading td,
.status-unloading td,
.calendar-item.status-loading,
.calendar-item.status-unloading{
background:rgba(255,193,7,.30);
color:#ffe082;
}

.status-complete td,
.calendar-item.status-complete{
color:#888;
}

.status-hold td,
.status-problem td,
.calendar-item.status-hold,
.calendar-item.status-problem{
background:rgba(244,67,54,.35);
color:#ff9e9e;
font-weight:bold;
}

.status-checkedin td,
.status-checked-in td,
.calendar-item.status-checkedin,
.calendar-item.status-checked-in{
background:rgba(76,175,80,.30);
color:#b9f6ca;
}

.late td,
.calendar-item.late{
background:rgba(211,47,47,.45)!important;
color:#ffd0d0!important;
font-weight:bold;
}
</style>
</head>

<body>

<div class="header">FROZEN SPOT OPERATIONS</div>

<div class="topbar">
  <div class="counter">
    <div class="counter-label">Arriving</div>
    <div id="countArriving" class="counter-value">0</div>
  </div>
  <div class="counter">
    <div class="counter-label">Active Docks</div>
    <div id="countLoading" class="counter-value">0</div>
  </div>
  <div class="counter">
    <div class="counter-label">Departures</div>
    <div id="countDepartures" class="counter-value">0</div>
  </div>
  <div class="counter">
    <div class="counter-label">Late / Hold</div>
    <div id="countLate" class="counter-value">0</div>
  </div>
</div>

<div class="view-toggle">
  <button id="boardBtn" class="toggle-btn active" onclick="showBoardView()">Board View</button>
  <button id="calendarBtn" class="toggle-btn" onclick="showCalendarView()">Calendar View</button>
</div>

<div id="boardView" class="container">
  <div class="section">
    <h2>ARRIVING</h2>
    <table id="arriving"></table>
  </div>

  <div class="section">
    <h2>ACTIVE DOCKS</h2>
    <table id="loading"></table>
  </div>

  <div class="section">
    <h2>DEPARTURES</h2>
    <table id="departures"></table>
  </div>
</div>

<div id="calendarView" class="calendar-view">
  <h2 style="font-size:34px;margin-top:0;">CALENDAR VIEW</h2>
  <div id="calendarContent"></div>
</div>

<div class="footer">Warehouse Dashboard – Auto Refresh</div>

<script>
const url="https://docs.google.com/spreadsheets/d/e/2PACX-1vSnxm662nS0LeYmimnNz1l7EPkJ3NXfRb55aiMjfzrb1S7kP8lxIpp3k6EDJom8fpLdjYNIgXbGU2NP/pub?gid=0&single=true&output=csv";

function showBoardView(){
  document.getElementById("boardView").style.display="grid";
  document.getElementById("calendarView").style.display="none";
  document.getElementById("boardBtn").classList.add("active");
  document.getElementById("calendarBtn").classList.remove("active");
}

function showCalendarView(){
  document.getElementById("boardView").style.display="none";
  document.getElementById("calendarView").style.display="block";
  document.getElementById("calendarBtn").classList.add("active");
  document.getElementById("boardBtn").classList.remove("active");
}

function parseCSV(text){
  const rows = [];
  let row = [];
  let cell = "";
  let inQuotes = false;

  for (let i = 0; i < text.length; i++) {
    const char = text[i];
    const nextChar = text[i + 1];

    if (char === '"') {
      if (inQuotes && nextChar === '"') {
        cell += '"';
        i++;
      } else {
        inQuotes = !inQuotes;
      }
    } else if (char === ',' && !inQuotes) {
      row.push(cell);
      cell = "";
    } else if ((char === '\n' || char === '\r') && !inQuotes) {
      if (char === '\r' && nextChar === '\n') i++;
      row.push(cell);
      if (row.some(c => c.trim() !== "")) rows.push(row);
      row = [];
      cell = "";
    } else {
      cell += char;
    }
  }

  if (cell.length > 0 || row.length > 0) {
    row.push(cell);
    if (row.some(c => c.trim() !== "")) rows.push(row);
  }

  return rows;
}

function normalize(v){
  return (v||"").toLowerCase().trim();
}

function clean(v){
  return (v||"").trim();
}

function parseDate(dateStr){
  const value = clean(dateStr);
  const parts = value.split("/");
  if(parts.length !== 3) return null;
  return new Date(parts[2], parts[0]-1, parts[1]);
}

function minutes(t){
  if(!t) return 9999;

  const value = clean(t);
  const match = value.match(/^(\d{1,2}):(\d{2})(?::\d{2})?\s*([AaPp][Mm])?$/);
  if(!match) return 9999;

  let hour = parseInt(match[1],10);
  const min = parseInt(match[2],10);
  const ampm = match[3] ? match[3].toUpperCase() : null;

  if(ampm==="PM" && hour!==12) hour += 12;
  if(ampm==="AM" && hour===12) hour = 0;

  return hour*60+min;
}

function isLate(date,time,status){
  if(normalize(status)=="complete") return false;

  let rowDate = parseDate(date);
  if(!rowDate) return false;

  let now = new Date();
  if(rowDate.toDateString() != now.toDateString()) return false;

  let rowMin = minutes(time);
  let nowMin = now.getHours()*60 + now.getMinutes();

  return rowMin < nowMin;
}

function createBoardRow(item){
  return `
  <tr class="status-${item.norm} ${item.late?'late':''}">
    <td>
      <div class="time-block">
        <span class="time-date">${item.date}</span>
        <span class="time-hour">${item.eta}</span>
      </div>
    </td>
    <td>
      ${item.container}
      <span class="small">${item.client}</span>
      <span class="small">${item.cargo} • ${item.country} • ${item.temp}</span>
    </td>
    <td>Door ${item.door}</td>
  </tr>
  `;
}

function createCalendarItem(item){
  return `
  <div class="calendar-item status-${item.norm} ${item.late?'late':''}">
    <div class="calendar-time">${item.eta}</div>
    <div class="calendar-main">${item.direction} • ${item.container} • Door ${item.door}</div>
    <div class="calendar-sub">${item.client}</div>
    <div class="calendar-sub">${item.cargo} • ${item.country} • ${item.temp} • ${item.status}</div>
  </div>
  `;
}

fetch(url)
.then(r=>r.text())
.then(text=>{

  let rows=parseCSV(text);
  rows.shift();

  let arriving=[];
  let loading=[];
  let departures=[];
  let allItems=[];

  let lateCount=0;

  rows.forEach(r=>{

    // 0 Priority
    // 1 Date
    // 2 ETA
    // 3 Direction
    // 4 Type of Cargo
    // 5 Country
    // 6 Container
    // 7 Client
    // 8 Temperature
    // 9 Door
    // 10 Status
    // 11 Notes

    let date=clean(r[1]);
    let eta=clean(r[2]);
    let direction=clean(r[3]);
    let cargo=clean(r[4]);
    let country=clean(r[5]);
    let container=clean(r[6]);
    let client=clean(r[7]);
    let temp=clean(r[8]);
    let door=clean(r[9]);
    let status=clean(r[10]);

    let norm=normalize(status);

    if(!date && !eta && !direction && !container) return;

    let late=isLate(date,eta,status)||norm.includes("hold")||norm.includes("problem");
    if(late) lateCount++;

    let parsedDate=parseDate(date);

    let item={
      date,
      eta,
      direction,
      cargo,
      country,
      container,
      client,
      temp,
      door,
      status,
      norm,
      late,
      parsedDate,
      sortDate: parsedDate ? parsedDate.getTime() : Number.MAX_SAFE_INTEGER,
      sortTime: minutes(eta)
    };

    allItems.push(item);

    if(direction=="Arriving") arriving.push(item);
    if(direction=="Leaving") departures.push(item);
    if(norm.includes("loading")||norm.includes("unloading")) loading.push(item);
  });

  // ascending date, then ascending time
  const sorter = (a,b) => {
    if(a.sortDate !== b.sortDate) return a.sortDate - b.sortDate;
    return a.sortTime - b.sortTime;
  };

  arriving.sort(sorter);
  loading.sort(sorter);
  departures.sort(sorter);
  allItems.sort(sorter);

  arriving.forEach(x=>document.getElementById("arriving").innerHTML += createBoardRow(x));
  loading.forEach(x=>document.getElementById("loading").innerHTML += createBoardRow(x));
  departures.forEach(x=>document.getElementById("departures").innerHTML += createBoardRow(x));

  document.getElementById("countArriving").innerText=arriving.length;
  document.getElementById("countLoading").innerText=loading.length;
  document.getElementById("countDepartures").innerText=departures.length;
  document.getElementById("countLate").innerText=lateCount;

  // calendar view grouped by date
  let grouped = {};
  allItems.forEach(item=>{
    if(!grouped[item.date]) grouped[item.date] = [];
    grouped[item.date].push(item);
  });

  const calendarContent = document.getElementById("calendarContent");
  Object.keys(grouped)
    .sort((a,b)=>{
      const da=parseDate(a);
      const db=parseDate(b);
      return da - db;
    })
    .forEach(date=>{
      let block = `<div class="calendar-day"><h3>${date}</h3>`;
      grouped[date].forEach(item=>{
        block += createCalendarItem(item);
      });
      block += `</div>`;
      calendarContent.innerHTML += block;
    });

});

setTimeout(()=>location.reload(),15000);

</script>

</body>
</html>
