<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Frozen Spot Operations</title>

<style>

body{
background:#000;
color:#fff;
font-family:Arial;
margin:0;
padding:10px;
}

.header{
text-align:center;
font-size:60px;
font-weight:bold;
margin-bottom:15px;
}

.topbar{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:14px;
margin-bottom:16px;
}

.counter{
background:#111;
border-radius:8px;
padding:14px;
text-align:center;
}

.counter-label{
font-size:20px;
color:#bbb;
}

.counter-value{
font-size:42px;
font-weight:bold;
}

.container{
display:grid;
grid-template-columns:1fr 1fr 1fr;
gap:18px;
}

.section{
background:#111;
border-radius:8px;
padding:18px;
min-height:320px;
}

.section h2{
font-size:34px;
margin-bottom:14px;
}

table{
width:100%;
border-collapse:collapse;
}

td{
padding:10px;
font-size:24px;
border-bottom:1px solid #222;
vertical-align:top;
}

.small{
display:block;
font-size:16px;
color:#bbb;
margin-top:3px;
}

.footer{
text-align:center;
margin-top:16px;
font-size:22px;
color:#bbb;
}

/* status colors */

.status-loading td{
background:rgba(255,193,7,.30);
color:#ffe082;
}

.status-unloading td{
background:rgba(255,193,7,.30);
color:#ffe082;
}

.status-complete td{
color:#888;
}

.status-hold td,
.status-problem td{
background:rgba(244,67,54,.35);
color:#ff9e9e;
font-weight:bold;
}

.status-checkedin td{
background:rgba(76,175,80,.30);
color:#b9f6ca;
}

.late td{
background:rgba(211,47,47,.45)!important;
color:#ffd0d0!important;
font-weight:bold;
}

</style>
</head>

<body>

<div class="header">FROZEN SPOT OPERATIONS</div>

<div class="topbar">

<div class="counter">
<div class="counter-label">Arriving</div>
<div id="countArriving" class="counter-value">0</div>
</div>

<div class="counter">
<div class="counter-label">Active Docks</div>
<div id="countLoading" class="counter-value">0</div>
</div>

<div class="counter">
<div class="counter-label">Departures</div>
<div id="countDepartures" class="counter-value">0</div>
</div>

<div class="counter">
<div class="counter-label">Late / Hold</div>
<div id="countLate" class="counter-value">0</div>
</div>

</div>

<div class="container">

<div class="section">
<h2>ARRIVING</h2>
<table id="arriving"></table>
</div>

<div class="section">
<h2>ACTIVE DOCKS</h2>
<table id="loading"></table>
</div>

<div class="section">
<h2>DEPARTURES</h2>
<table id="departures"></table>
</div>

</div>

<div class="footer">Warehouse Dashboard – Auto Refresh</div>

<script>

const url="https://docs.google.com/spreadsheets/d/e/2PACX-1vSnxm662nS0LeYmimnNz1l7EPkJ3NXfRb55aiMjfzrb1S7kP8lxIpp3k6EDJom8fpLdjYNIgXbGU2NP/pub?gid=0&single=true&output=csv";

function parseCSV(text){
return text.split("\n").map(r=>r.split(","));
}

function normalize(v){
return (v||"").toLowerCase().trim();
}

function minutes(t){
if(!t)return 9999;
let p=t.split(":");
return parseInt(p[0])*60+parseInt(p[1]);
}

function isLate(date,time,status){

if(normalize(status)=="complete")return false;

let now=new Date();

let d=date.split("/");
let rowDate=new Date(d[2],d[0]-1,d[1]);

if(rowDate.toDateString()!=now.toDateString())return false;

let rowMin=minutes(time);
let nowMin=now.getHours()*60+now.getMinutes();

return rowMin<nowMin;

}

fetch(url)
.then(r=>r.text())
.then(text=>{

let rows=parseCSV(text);
rows.shift();

let arriving=[];
let loading=[];
let departures=[];

let lateCount=0;

rows.forEach(r=>{

let date=r[1];
let eta=r[2];
let direction=r[3];
let cargo=r[4];
let country=r[5];
let container=r[6];
let client=r[7];
let temp=r[8];
let door=r[9];
let status=r[10];

let norm=normalize(status);

let late=isLate(date,eta,status)||norm.includes("hold")||norm.includes("problem");

if(late)lateCount++;

let row=`
<tr class="status-${norm} ${late?'late':''}">
<td>${eta}</td>
<td>
${container}
<span class="small">${client}</span>
<span class="small">${cargo} • ${country} • ${temp}</span>
</td>
<td>Door ${door}</td>
</tr>
`;

if(direction=="Arriving")arriving.push(row);
if(direction=="Leaving")departures.push(row);

if(norm.includes("loading")||norm.includes("unloading"))
loading.push(row);

});

arriving.forEach(r=>document.getElementById("arriving").innerHTML+=r);
loading.forEach(r=>document.getElementById("loading").innerHTML+=r);
departures.forEach(r=>document.getElementById("departures").innerHTML+=r);

document.getElementById("countArriving").innerText=arriving.length;
document.getElementById("countLoading").innerText=loading.length;
document.getElementById("countDepartures").innerText=departures.length;
document.getElementById("countLate").innerText=lateCount;

});

setTimeout(()=>location.reload(),15000);

</script>

</body>
</html>
