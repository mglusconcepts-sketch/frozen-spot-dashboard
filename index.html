<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Frozen Spot Dashboard</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #000;
      color: #fff;
    }

    h1 {
      text-align: center;
      margin: 10px 0;
      font-size: 42px;
    }

    /* ===== COUNTERS ===== */
    .top-bar {
      display: flex;
      gap: 10px;
      padding: 10px;
    }

    .counter {
      flex: 1;
      background: #111;
      text-align: center;
      padding: 15px;
      border-radius: 6px;
    }

    .counter span {
      font-size: 28px;
      font-weight: bold;
    }

    /* ===== BOARD VIEW ===== */
    .board {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 15px;
      padding: 10px;
    }

    .column {
      background: #111;
      padding: 10px;
      border-radius: 6px;
    }

    .column h2 {
      margin-bottom: 10px;
    }

    .item {
      border-bottom: 1px solid #333;
      padding: 12px 0;
    }

    /* 🔥 BIGGER DATE */
    .item-date {
      font-size: 16px;
      color: #bbb;
      font-weight: 600;
    }

    /* 🔥 BIGGER TIME */
    .item-time {
      font-size: 22px;
      font-weight: bold;
    }

    /* 🔥 BIGGER CLIENT */
    .item-client {
      font-size: 22px;
      font-weight: 700;
    }

    .item-extra {
      font-size: 14px;
      color: #aaa;
    }

    .late {
      background: #6b1d1d;
    }

    .active {
      background: #1d4d2b;
    }

    /* ===== CALENDAR ===== */
    #calendarView {
      display: none;
      padding: 5px;
    }

    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      height: calc(100vh - 120px);
    }

    .day-header {
      text-align: center;
      font-size: 14px;
      background: #111;
      padding: 5px;
      font-weight: bold;
    }

    .day {
      border: 1px solid #333;
      padding: 5px;
      background: #eee;
      color: #000;
      overflow: hidden;
    }

    .day-number {
      font-size: 12px;
      margin-bottom: 5px;
    }

    .event {
      font-size: 14px;
      padding: 2px 4px;
      margin-bottom: 2px;
      border-radius: 3px;
    }

    .in {
      background: #f2a3a3;
    }

    .out {
      background: #a3c4f2;
    }

  </style>
</head>

<body>

<h1>FROZEN SPOT OPERATIONS</h1>

<div class="top-bar">
  <div class="counter">Arriving<br><span id="arrivingCount">0</span></div>
  <div class="counter">Active Docks<br><span id="activeCount">0</span></div>
  <div class="counter">Departures<br><span id="departCount">0</span></div>
  <div class="counter">Late / Hold<br><span id="lateCount">0</span></div>
</div>

<!-- BOARD VIEW -->
<div id="boardView">
  <div class="board">
    <div class="column">
      <h2>ARRIVING</h2>
      <div id="arriving"></div>
    </div>

    <div class="column">
      <h2>ACTIVE DOCKS</h2>
      <div id="active"></div>
    </div>

    <div class="column">
      <h2>DEPARTURES</h2>
      <div id="departures"></div>
    </div>
  </div>
</div>

<!-- CALENDAR VIEW -->
<div id="calendarView">
  <h2 style="text-align:center" id="monthTitle"></h2>
  <div class="calendar-grid" id="calendar"></div>
</div>

<script>
const SHEET_URL = "PASTE_YOUR_CSV_LINK_HERE";

let showCalendar = false;

/* ===== FETCH DATA ===== */
async function loadData() {
  const res = await fetch(SHEET_URL);
  const text = await res.text();
  const rows = text.split("\n").map(r => r.split(","));

  const headers = rows[0];
  const data = rows.slice(1).map(r => {
    let obj = {};
    headers.forEach((h, i) => obj[h.trim()] = r[i]);
    return obj;
  });

  process(data);
}

/* ===== PROCESS ===== */
function process(data) {

  const now = new Date();

  let arriving = [];
  let active = [];
  let depart = [];
  let late = [];

  data.forEach(item => {
    if (!item.Date || !item.ETA) return;

    let dt = new Date(item.Date + " " + item.ETA);

    item.parsedDate = dt;

    if (item.Status === "Loading") active.push(item);
    else if (item.Direction === "Arriving") arriving.push(item);
    else if (item.Direction === "Leaving") depart.push(item);

    if (dt < now && item.Status !== "Done") late.push(item);
  });

  /* SORT */
  const sortFn = (a,b)=>a.parsedDate - b.parsedDate;
  arriving.sort(sortFn);
  active.sort(sortFn);
  depart.sort(sortFn);

  /* COUNTS */
  document.getElementById("arrivingCount").innerText = arriving.length;
  document.getElementById("activeCount").innerText = active.length;
  document.getElementById("departCount").innerText = depart.length;
  document.getElementById("lateCount").innerText = late.length;

  renderBoard(arriving, active, depart, now);
  renderCalendar(data);
}

/* ===== BOARD ===== */
function renderBoard(arriving, active, depart, now){

  const set = (id, list)=>{
    const el = document.getElementById(id);
    el.innerHTML = "";

    list.forEach(i=>{
      const d = i.parsedDate;

      const div = document.createElement("div");
      div.className = "item";

      if (d < now) div.classList.add("late");
      if (i.Status === "Loading") div.classList.add("active");

      const ref =
        i["PO / BL# / Booking#"] || "";

      div.innerHTML = `
        <div class="item-date">${d.toLocaleDateString()}</div>
        <div class="item-time">${d.toLocaleTimeString()}</div>
        <div class="item-client">${i.Client || "Unknown"}</div>
        <div class="item-extra">${ref}</div>
        <div class="item-extra">Door ${i.Door || "-"}</div>
      `;

      el.appendChild(div);
    });
  };

  set("arriving", arriving);
  set("active", active);
  set("departures", depart);
}

/* ===== CALENDAR ===== */
function renderCalendar(data){

  const cal = document.getElementById("calendar");
  cal.innerHTML = "";

  const now = new Date();
  const year = now.getFullYear();
  const month = now.getMonth();

  document.getElementById("monthTitle").innerText =
    now.toLocaleString("default", {month:"long"}) + " " + year;

  const first = new Date(year, month, 1);
  const last = new Date(year, month+1, 0);

  const days = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];

  days.forEach(d=>{
    const div = document.createElement("div");
    div.className = "day-header";
    div.innerText = d;
    cal.appendChild(div);
  });

  let map = {};

  data.forEach(i=>{
    if (!i.Date) return;

    const d = new Date(i.Date);
    const key = d.toDateString();

    if (!map[key]) map[key] = [];

    let label = i.Client;

    if (i.Direction === "Arriving") label += "-IN";
    else label += "-OUT";

    if (i["PO / BL# / Booking#"])
      label += `(${i["PO / BL# / Booking#"]})`;

    map[key].push(label);
  });

  for(let i=1;i<=last.getDate();i++){
    const day = new Date(year,month,i);

    const cell = document.createElement("div");
    cell.className = "day";

    cell.innerHTML = `<div class="day-number">${i}</div>`;

    const events = map[day.toDateString()] || [];

    events.forEach(e=>{
      const div = document.createElement("div");
      div.className = "event " + (e.includes("-IN") ? "in":"out");
      div.innerText = e;
      cell.appendChild(div);
    });

    cal.appendChild(cell);
  }
}

/* ===== AUTO TOGGLE ===== */
setInterval(()=>{
  showCalendar = !showCalendar;

  document.getElementById("boardView").style.display =
    showCalendar ? "none":"block";

  document.getElementById("calendarView").style.display =
    showCalendar ? "block":"none";

},10000);

/* ===== AUTO REFRESH ===== */
setInterval(loadData, 10000);

loadData();

</script>

</body>
</html>
