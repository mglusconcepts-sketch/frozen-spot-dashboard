<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Frozen Spot Operations</title>

<style>
body{
background:#000;
color:#fff;
font-family:Arial;
margin:0;
padding:10px;
}

.header{
text-align:center;
font-size:60px;
font-weight:bold;
margin-bottom:15px;
}

.topbar{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:14px;
margin-bottom:16px;
}

.counter{
background:#111;
border-radius:8px;
padding:14px;
text-align:center;
}

.counter-label{
font-size:20px;
color:#bbb;
}

.counter-value{
font-size:42px;
font-weight:bold;
}

.container{
display:grid;
grid-template-columns:1fr 1fr 1fr;
gap:18px;
}

.section{
background:#111;
border-radius:8px;
padding:18px;
min-height:320px;
}

.section h2{
font-size:34px;
margin-bottom:14px;
}

table{
width:100%;
border-collapse:collapse;
}

td{
padding:10px;
font-size:24px;
border-bottom:1px solid #222;
vertical-align:top;
}

.time-block{
line-height:1.2;
}

.time-date{
display:block;
font-size:16px;
color:#bbb;
margin-bottom:4px;
}

.time-hour{
display:block;
font-size:24px;
font-weight:bold;
}

.small{
display:block;
font-size:16px;
color:#bbb;
margin-top:3px;
}

.footer{
text-align:center;
margin-top:16px;
font-size:22px;
color:#bbb;
}

/* status colors */

.status-loading td{
background:rgba(255,193,7,.30);
color:#ffe082;
}

.status-unloading td{
background:rgba(255,193,7,.30);
color:#ffe082;
}

.status-complete td{
color:#888;
}

.status-hold td,
.status-problem td{
background:rgba(244,67,54,.35);
color:#ff9e9e;
font-weight:bold;
}

.status-checkedin td,
.status-checked-in td{
background:rgba(76,175,80,.30);
color:#b9f6ca;
}

.late td{
background:rgba(211,47,47,.45)!important;
color:#ffd0d0!important;
font-weight:bold;
}

</style>
</head>

<body>

<div class="header">FROZEN SPOT OPERATIONS</div>

<div class="topbar">

<div class="counter">
<div class="counter-label">Arriving</div>
<div id="countArriving" class="counter-value">0</div>
</div>

<div class="counter">
<div class="counter-label">Active Docks</div>
<div id="countLoading" class="counter-value">0</div>
</div>

<div class="counter">
<div class="counter-label">Departures</div>
<div id="countDepartures" class="counter-value">0</div>
</div>

<div class="counter">
<div class="counter-label">Late / Hold</div>
<div id="countLate" class="counter-value">0</div>
</div>

</div>

<div class="container">

<div class="section">
<h2>ARRIVING</h2>
<table id="arriving"></table>
</div>

<div class="section">
<h2>ACTIVE DOCKS</h2>
<table id="loading"></table>
</div>

<div class="section">
<h2>DEPARTURES</h2>
<table id="departures"></table>
</div>

</div>

<div class="footer">Warehouse Dashboard – Auto Refresh</div>

<script>

const url="https://docs.google.com/spreadsheets/d/e/2PACX-1vSnxm662nS0LeYmimnNz1l7EPkJ3NXfRb55aiMjfzrb1S7kP8lxIpp3k6EDJom8fpLdjYNIgXbGU2NP/pub?gid=0&single=true&output=csv";

function parseCSV(text){
const rows = [];
let row = [];
let cell = "";
let inQuotes = false;

for (let i = 0; i < text.length; i++) {
  const char = text[i];
  const nextChar = text[i + 1];

  if (char === '"') {
    if (inQuotes && nextChar === '"') {
      cell += '"';
      i++;
    } else {
      inQuotes = !inQuotes;
    }
  } else if (char === ',' && !inQuotes) {
    row.push(cell);
    cell = "";
  } else if ((char === '\n' || char === '\r') && !inQuotes) {
    if (char === '\r' && nextChar === '\n') i++;
    row.push(cell);
    if (row.some(c => c.trim() !== "")) rows.push(row);
    row = [];
    cell = "";
  } else {
    cell += char;
  }
}

if (cell.length > 0 || row.length > 0) {
  row.push(cell);
  if (row.some(c => c.trim() !== "")) rows.push(row);
}

return rows;
}

function normalize(v){
return (v||"").toLowerCase().trim();
}

function clean(v){
return (v||"").trim();
}

function minutes(t){
if(!t) return 9999;

const value = clean(t);
const match = value.match(/^(\d{1,2}):(\d{2})(?::\d{2})?\s*([AaPp][Mm])?$/);
if(!match) return 9999;

let hour = parseInt(match[1],10);
const min = parseInt(match[2],10);
const ampm = match[3] ? match[3].toUpperCase() : null;

if(ampm==="PM" && hour!==12) hour += 12;
if(ampm==="AM" && hour===12) hour = 0;

return hour*60+min;
}

function formatDate(dateStr){
return clean(dateStr);
}

function formatTime(timeStr){
return clean(timeStr);
}

function isLate(date,time,status){

if(normalize(status)=="complete") return false;

let rowDateStr = clean(date);
if(!rowDateStr) return false;

let d = rowDateStr.split("/");
if(d.length !== 3) return false;

let rowDate = new Date(d[2], d[0]-1, d[1]);
let now = new Date();

if(rowDate.toDateString() != now.toDateString()) return false;

let rowMin = minutes(time);
let nowMin = now.getHours()*60 + now.getMinutes();

return rowMin < nowMin;

}

fetch(url)
.then(r=>r.text())
.then(text=>{

let rows=parseCSV(text);
rows.shift();

let arriving=[];
let loading=[];
let departures=[];

let lateCount=0;

rows.forEach(r=>{

// New sheet layout:
// 0 Priority
// 1 Date
// 2 ETA
// 3 Direction
// 4 Type of Cargo
// 5 Country
// 6 Container
// 7 Client
// 8 Temperature
// 9 Door
// 10 Status
// 11 Notes

let date=clean(r[1]);
let eta=clean(r[2]);
let direction=clean(r[3]);
let cargo=clean(r[4]);
let country=clean(r[5]);
let container=clean(r[6]);
let client=clean(r[7]);
let temp=clean(r[8]);
let door=clean(r[9]);
let status=clean(r[10]);

let norm=normalize(status);

if(!date && !eta && !direction && !container) return;

let late=isLate(date,eta,status)||norm.includes("hold")||norm.includes("problem");

if(late) lateCount++;

let row=`
<tr class="status-${norm} ${late?'late':''}">
<td>
  <div class="time-block">
    <span class="time-date">${formatDate(date)}</span>
    <span class="time-hour">${formatTime(eta)}</span>
  </div>
</td>
<td>
${container}
<span class="small">${client}</span>
<span class="small">${cargo} • ${country} • ${temp}</span>
</td>
<td>Door ${door}</td>
</tr>
`;

let item={
row:row,
sortMinutes:minutes(eta)
};

if(direction=="Arriving") arriving.push(item);
if(direction=="Leaving") departures.push(item);

if(norm.includes("loading")||norm.includes("unloading"))
loading.push(item);

});

arriving.sort((a,b)=>a.sortMinutes-b.sortMinutes);
loading.sort((a,b)=>a.sortMinutes-b.sortMinutes);
departures.sort((a,b)=>a.sortMinutes-b.sortMinutes);

arriving.forEach(x=>document.getElementById("arriving").innerHTML+=x.row);
loading.forEach(x=>document.getElementById("loading").innerHTML+=x.row);
departures.forEach(x=>document.getElementById("departures").innerHTML+=x.row);

document.getElementById("countArriving").innerText=arriving.length;
document.getElementById("countLoading").innerText=loading.length;
document.getElementById("countDepartures").innerText=departures.length;
document.getElementById("countLate").innerText=lateCount;

});

setTimeout(()=>location.reload(),15000);

</script>

</body>
</html>
