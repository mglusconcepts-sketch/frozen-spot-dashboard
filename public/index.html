<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<title>Frozen Spot Dashboard</title>

<style>
body { font-family: Arial; margin:0; background:#eef3f9; }

.header {
  background:#0b1220;
  color:white;
  padding:15px;
  display:flex;
  align-items:center;
  justify-content:space-between;
}

.legend span {
  display:inline-block;
  width:12px;
  height:12px;
  margin-right:6px;
}

.red{background:#ef4444;}
.green{background:#22c55e;}
.blue{background:#3b82f6;}
.yellow{background:#facc15;}

.section {
  background:white;
  margin:10px;
  padding:10px;
  border-radius:10px;
}

table { width:100%; }
td { padding:6px; border-bottom:1px solid #ddd; }

.loading td{ background:#dbeafe;}
.unloading td{ background:#fff4cc;}
.ready td{ background:#dcfce7;}
.late td{ background:#fecaca;}

.temp-dry{ color:red; font-weight:bold;}
.temp-frozen{ color:blue; font-weight:bold;}
</style>

</head>

<body>

<div class="header">
  <h2>FROZEN SPOT OPERATIONS</h2>
  <div class="legend">
    <span class="red"></span>Late
    <span class="green"></span>Ready
    <span class="blue"></span>Loading
    <span class="yellow"></span>Unloading
  </div>
</div>

<div class="section">
  <h3>Dashboard</h3>
  <table id="data"></table>
</div>

<script>

const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSnxm662nS0LeYmimnNz1l7EPkJ3NXfRb55aiMjfzrb1S7kP8lxIpp3k6EDJom8fpLdjYNIgXbGU2NP/pub?gid=0&single=true&output=csv";

fetch(url)
.then(r=>r.text())
.then(text=>{
  const rows = text.split("\n").map(r=>r.split(","));
  rows.shift();

  let html="";

  const today = new Date();
  const end = new Date();
  end.setDate(today.getDate()+7);

  rows.forEach(r=>{
    const date = new Date(r[1]);
    if(date<today || date>end) return;

    let status = (r[11]||"").toLowerCase();

    let cls="";
    if(status.includes("loading")) cls="loading";
    else if(status.includes("unloading")) cls="unloading";
    else if(status.includes("ready")) cls="ready";
    else if(status.includes("hold")) cls="late";

    let temp = r[9];
    if(temp=="Dry") temp='<span class="temp-dry">Dry</span>';
    if(temp=="Frozen") temp='<span class="temp-frozen">Frozen</span>';

    html+=`
    <tr class="${cls}">
      <td>${r[1]} ${r[2]}</td>
      <td><b>${r[8]}</b><br>${r[4]} • ${r[5]} • ${temp}</td>
      <td>${r[7]} ${r[12]}</td>
      <td>Door ${r[10]}</td>
    </tr>`;
  });

  document.getElementById("data").innerHTML = html;
});

setInterval(()=>location.reload(),60000);

</script>

</body>
</html>
